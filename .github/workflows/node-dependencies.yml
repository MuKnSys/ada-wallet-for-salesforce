# Verifies that Node.js dependency changes still support the LWC-based features
# documented in README.md (Lightning Web Components: seed phrase, wallets, UTXOs,
# signing, Blockfrost setup UI, etc.). Local Node tooling uses ESLint, Prettier,
# and sfdx-lwc-jest (see package.json).
#
# Triggers on dependency manifests so Dependabot / manual lockfile updates are checked.

name: Node.js dependencies

on:
  push:
    branches: [main, develop]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/node-dependencies.yml'
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/node-dependencies.yml'
  workflow_dispatch:

concurrency:
  group: node-dependencies-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Install and verify LWC toolchain
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      HUSKY: '0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Run LWC Jest (validates @salesforce/sfdx-lwc-jest and related deps)
        run: npm run test:unit -- --passWithNoTests
